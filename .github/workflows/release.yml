name: Release

# Fires on a version tag (e.g. `v0.1.0`). Builds and bundles
# markdown-pdf-sidecar.tar.gz and attaches it to the GitHub Release. The
# extension's WASM coordinator downloads this asset at runtime via
# `latest_github_release`, so it MUST exist before the new version reaches users.
#
# Release flow:
#   1. bump `version` in extension.toml AND Cargo.toml (keep them equal)
#   2. git commit, then: git tag v0.1.1 && git push --tags
#
# This fork does not publish to the zed-industries/extensions registry, so there
# is no registry-submission job. If you ever do, add one running
# huacnlee/zed-extension-action with a COMMITTER_TOKEN secret.

on:
  push:
    tags:
      - "v*"

jobs:
  sidecar:
    name: Build & publish sidecar
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload the asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sidecar/package-lock.json

      - name: Build & bundle sidecar
        run: ./scripts/package-sidecar.sh # -> markdown-pdf-sidecar.tar.gz (repo root)

      - name: Smoke-test the built sidecar
        run: node scripts/smoke-lsp.mjs sidecar/dist/server.js

      # Never publish a sidecar that cannot render: drive the packaged build
      # through a real headless-Chromium export before attaching the asset.
      - name: Ensure a system Chrome/Chromium is available
        run: |
          if command -v google-chrome >/dev/null 2>&1 || [ -x /usr/bin/chromium-browser ]; then
            echo "Using preinstalled browser: $(command -v google-chrome || echo /usr/bin/chromium-browser)"
          else
            echo "Installing Google Chrome (.deb)"
            wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get update
            sudo apt-get install -y /tmp/chrome.deb
          fi
          google-chrome --version || /usr/bin/chromium-browser --version || true

      - name: Enable Chromium sandbox (Ubuntu 24.04 userns restriction)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Render a fixture to PDF and assert %PDF- output
        run: node scripts/ci-render.mjs sidecar/dist/server.js

      - name: Publish GitHub Release with sidecar asset
        uses: softprops/action-gh-release@v2
        with:
          # Non-prerelease so latest_github_release(pre_release: false) finds it.
          files: markdown-pdf-sidecar.tar.gz
          generate_release_notes: true
