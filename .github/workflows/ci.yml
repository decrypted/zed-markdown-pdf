name: CI

# Validates every push / PR the same way the Zed registry will:
#   - compiles the Rust coordinator to wasm32-wasip2 (what zed-industries CI does)
#   - builds the TypeScript sidecar and type-checks it
#   - smoke-tests the sidecar's LSP handshake (asserts the export command is advertised)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: Build WASM coordinator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (wasm32-wasip2)
        run: cargo build --release --locked --target wasm32-wasip2

  sidecar:
    name: Build & smoke-test sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - name: Install dependencies
        working-directory: sidecar
        run: npm ci
      - name: Type-check & build
        working-directory: sidecar
        run: npm run build
      - name: Smoke-test LSP handshake
        run: node scripts/smoke-lsp.mjs sidecar/dist/server.js
